# ============================================================
# config.properties — configuração de rede do Leilão Distribuído
# ============================================================
#
# Este arquivo fica na mesma pasta de onde você roda o "java -cp out ...".
# Cada máquina da rede deve ter o seu próprio config.properties, com os
# IPs reais daquela máquina e das outras.
#
# Se este arquivo não existir, o sistema usa "localhost" em tudo e
# continua funcionando normalmente para testes em uma única máquina.
#
# Qualquer chave também pode ser sobrescrita na hora de rodar, sem editar
# o arquivo, usando -Dchave=valor. Exemplo:
#   java -Dendereco.replica=192.168.0.11 -cp out leilao.servidor.ServidorLeilao
#
# ------------------------------------------------------------
# 1) ENDEREÇOS DAS MÁQUINAS
# ------------------------------------------------------------
# IP (ou hostname) real de cada máquina na rede. Em um único computador,
# deixe "localhost" nos dois. Em duas máquinas diferentes, troque pelo IP
# de cada uma (exemplo: 192.168.0.10).
#
# endereco.primario = IP da máquina que roda o ServidorLeilao
# endereco.replica  = IP da máquina que roda o ServidorReplica

endereco.primario=localhost
endereco.replica=localhost

# ------------------------------------------------------------
# 2) PORTAS DE CADA SERVIÇO
# ------------------------------------------------------------
# Só precisam mudar se a porta já estiver em uso na máquina.

porta.clientes=5555
porta.replicacao=6000
porta.http=8080

# ------------------------------------------------------------
# 3) TOLERÂNCIA A QUEDA DE REDE
# ------------------------------------------------------------
# Tempo máximo (em milissegundos) que uma tentativa de conexão espera
# antes de desistir e tentar de novo mais tarde. Evita que o sistema
# fique "travado" esperando resposta de uma máquina que perdeu a rede.

rede.timeout.conexao.ms=3000
