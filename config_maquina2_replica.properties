# ================================================================
#  ARQUIVO DE CONFIGURAÇÃO — MÁQUINA 2 (SERVIDOR RÉPLICA)
# ================================================================
#
# COMO USAR:
#   1. Descubra o IP da Máquina 1 (primário).
#   2. Descubra o IP desta máquina (Máquina 2 / réplica).
#   3. Preencha os campos abaixo.
#   4. Copie este arquivo para "config.properties" na Máquina 2.
#
# Exemplo:
#   endereco.primario=192.168.1.10
#   endereco.replica=192.168.1.11
#
# ================================================================

# IP da Máquina 1 (servidor primário)
endereco.primario=192.168.1.10

# IP desta máquina (servidor réplica)
endereco.replica=192.168.1.11

# Portas
porta.clientes=5555
porta.replicacao=6000
porta.http=8080

# Tempo máximo de espera por conexão, em milissegundos
rede.timeout.conexao.ms=3000
