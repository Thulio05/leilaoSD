# ================================================================
#  ARQUIVO DE CONFIGURAÇÃO — MÁQUINA 2 (SERVIDOR RÉPLICA)
# ================================================================
#
# COMO USAR:
#   1. Descubra o IP desta máquina (Máquina 2):
#        Windows: abra o Prompt de Comando e digite "ipconfig"
#                 procure por "Endereço IPv4" (ex: 192.168.1.11)
#
#   2. Descubra o IP da Máquina 1 (primário) da mesma forma.
#
#   3. Preencha os dois campos abaixo com os IPs corretos.
#
#   4. Copie este arquivo para a pasta onde você vai executar
#      a réplica, renomeando para "config.properties".
#
# ================================================================

# IP da Máquina 1 (servidor primário — a outra máquina)
endereco.primario=192.168.1.10

# IP desta máquina (Máquina 2 — servidor réplica)
endereco.replica=192.168.1.11

# Portas — não precisa mudar
porta.clientes=5555
porta.replicacao=6000
porta.http=8080

# Tempo máximo de espera por uma conexão (em milissegundos)
rede.timeout.conexao.ms=3000
