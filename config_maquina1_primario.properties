# ================================================================
#  ARQUIVO DE CONFIGURAÇÃO — MÁQUINA 1 (SERVIDOR PRIMÁRIO)
# ================================================================
#
# COMO USAR:
#   1. Descubra o IP desta máquina:
#        Windows: abra o Prompt de Comando e digite "ipconfig"
#                 procure por "Endereço IPv4" (ex: 192.168.1.10)
#        Mac/Linux: abra o Terminal e digite "hostname -I"
#
#   2. Descubra o IP da Máquina 2 (réplica) da mesma forma.
#
#   3. Preencha os dois campos abaixo com os IPs corretos.
#
#   4. Copie este arquivo para a pasta onde você vai executar
#      o servidor (mesma pasta que o compilado .class ou .jar).
#
# ================================================================

# IP desta máquina (Máquina 1 — servidor primário)
# Troque pelo IP real que apareceu no ipconfig/hostname
endereco.primario=192.168.31.24

# IP da outra máquina (Máquina 2 — servidor réplica)
# Troque pelo IP real da Máquina 2
endereco.replica=192.168.31.135

# Portas — não precisa mudar, a menos que alguma esteja bloqueada
porta.clientes=5555
porta.replicacao=6000
porta.http=8080

# Tempo máximo de espera por uma conexão (em milissegundos)
# 3000 = 3 segundos. Não precisa mudar.
rede.timeout.conexao.ms=3000
