# ============================================================
# config.properties — configuração de rede do Leilão Distribuído
# ============================================================
#
# Este arquivo fica na mesma pasta de onde você roda o "java -cp out ...".
# Cada máquina da rede pode ter o seu próprio config.properties, com os
# IPs reais daquela máquina.
#
# Se este arquivo não existir, o sistema usa "localhost" em tudo e
# continua funcionando normalmente para testes em uma única máquina.
#
# Qualquer chave também pode ser sobrescrita na hora de rodar, sem editar
# o arquivo, usando -Dchave=valor. Exemplo:
#   java -Dporta.http=8081 -cp out leilao.servidor.ServidorReplica
#
# ------------------------------------------------------------
# 1) ENDEREÇOS DOS PROCESSOS
# ------------------------------------------------------------
# IP (ou hostname) real de cada máquina na rede. Em um único computador,
# deixe "localhost". Em máquinas diferentes, troque pelo IP de cada uma
# (exemplo: 192.168.0.10).

endereco.primario=localhost
endereco.replica=localhost
endereco.dns=localhost

# ------------------------------------------------------------
# 2) PORTAS DE CADA SERVIÇO
# ------------------------------------------------------------

porta.clientes=5555
porta.replicacao=6000
porta.http=8080
porta.dns=5300
porta.balanceador=5500

# ------------------------------------------------------------
# 3) REGISTRO DO SERVIDOR DE NOMES ("DNS" simplificado)
# ------------------------------------------------------------
# Endereço que o ServidorNomes devolve quando alguém pergunta por
# "primario" ou "replica". Por padrão, é montado a partir dos endereços
# e da porta de clientes acima — normalmente você NÃO precisa mexer aqui,
# só se quiser um valor diferente do padrão.

# dns.primario=192.168.0.10:5555
# dns.replica=192.168.0.11:5555

# ------------------------------------------------------------
# 4) BALANCEADOR DE CARGA
# ------------------------------------------------------------
# Lista (separada por vírgula) dos painéis web (host:porta) entre os
# quais o balanceador alterna em round-robin. Em duas máquinas, use os
# IPs reais de cada uma, ambos na porta.http configurada (8080).
# Em uma única máquina, para não haver conflito de porta entre primário
# e réplica, rode um dos dois com -Dporta.http=8081 e ajuste a lista
# abaixo de acordo.

balanceador.backends=localhost:8080,localhost:8080
