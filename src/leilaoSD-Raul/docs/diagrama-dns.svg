<svg width="680" height="320" viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Fluxo do servidor de nomes (DNS simplificado) do projeto Leilão Distribuído</title>
<desc>O cliente pergunta ao servidor de nomes o endereço do servidor primário, recebe IP:porta de volta, e então conecta diretamente ao primário. Se o primário não responder, o cliente tenta o mesmo fluxo para a réplica.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#3d3d3a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<rect x="0" y="0" width="680" height="320" fill="#ffffff"/>

<g>
<rect x="50" y="30" width="220" height="56" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="160" y="50" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#2C2C2A">Cliente</text>
<text x="160" y="68" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#444441">pergunta o DNS antes</text>
</g>

<g>
<rect x="410" y="30" width="220" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="520" y="50" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#26215C">Servidor de nomes</text>
<text x="520" y="68" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#3C3489">nome &#8594; ip:porta</text>
</g>

<g>
<rect x="90" y="210" width="220" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="200" y="230" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#04342C">Servidor primário</text>
<text x="200" y="248" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#085041">porta 5555 (clientes)</text>
</g>

<g>
<rect x="380" y="210" width="220" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="490" y="230" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#4A1B0C">Servidor réplica</text>
<text x="490" y="248" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#712B13">assume no failover</text>
</g>

<line x1="270" y1="50" x2="408" y2="50" stroke="#3d3d3a" stroke-width="1" marker-end="url(#arrow)"/>
<text x="340" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#444441">1 RESOLVE nome</text>

<line x1="408" y1="68" x2="270" y2="68" stroke="#3d3d3a" stroke-width="1" marker-end="url(#arrow)"/>
<text x="340" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#444441">2 OK ip:porta</text>

<path d="M130 86 L130 150 L200 150 L200 208" fill="none" stroke="#3d3d3a" stroke-width="1" marker-end="url(#arrow)"/>
<text x="215" y="145" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#444441">3 conecta (TCP)</text>

<path d="M190 86 L190 180 L490 180 L490 208" fill="none" stroke="#3d3d3a" stroke-width="1" stroke-dasharray="4 4" marker-end="url(#arrow)"/>
<text x="340" y="174" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#444441">se o primário falhar</text>

</svg>
